<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 트렌드 리포트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 로딩 스피너 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #6b7280;
            font-size: 0.9em;
        }

        /* 리포트 뷰어 */
        #report-viewer {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        /* 모바일 토글 버튼 */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background-color: #1a1d27;
            border: 1px solid #2a2d3a;
            color: #c0c4d0;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
        }

        /* 사이드바 오버레이 (모바일) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }

        /* 아카이브 없을 때 */
        .empty-state {
            padding: 20px;
            color: #6b7280;
            font-size: 0.85em;
            line-height: 1.6;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .sidebar-toggle { display: block; }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 999;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.open {
                display: block;
            }

            .main-wrapper {
                margin-left: 0 !important;
            }

            #report-viewer {
                height: calc(100vh - 0px);
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
        }
    </style>
</head>
<body>

    <!-- 모바일 토글 버튼 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰ 아카이브</button>

    <!-- 사이드바 오버레이 -->
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- 사이드바 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">리포트 아카이브</div>
        <div id="archive-list">
            <div class="loading">불러오는 중...</div>
        </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main-wrapper" id="main-wrapper" style="margin-left: 280px; flex: 1;">
        <iframe id="report-viewer" title="리포트 뷰어"></iframe>
        <div class="main" id="welcome-screen">
            <div style="margin-top: 100px; text-align: center; color: #6b7280;">
                <div style="font-size: 2em; margin-bottom: 20px;">📊</div>
                <div style="font-size: 1.1em; font-weight: 600; color: #c0c4d0; margin-bottom: 12px;">
                    AI 트렌드 리포트
                </div>
                <div style="font-size: 0.9em; line-height: 1.8;">
                    왼쪽 아카이브에서 리포트를 선택해주세요.
                </div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = "jupiter-y";
        const GITHUB_REPO = "trend-report";
        const REPORTS_PATH = "reports";

        // 아카이브 리스트 로드
        async function loadArchive() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${REPORTS_PATH}`;
                const res = await fetch(url);
                const files = await res.json();

                if (!Array.isArray(files)) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                // HTML 파일만 필터링 후 최신순 정렬
                const htmlFiles = files
                    .filter(f => f.name.endsWith(".html"))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (htmlFiles.length === 0) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                // 첫 번째 파일 자동 로드
                renderArchive(htmlFiles);
                loadReport(htmlFiles[0].name, htmlFiles[0].download_url);

            } catch (e) {
                document.getElementById("archive-list").innerHTML =
                    '<div class="empty-state">아카이브를 불러오지 못했습니다.</div>';
            }
        }

        // 아카이브 리스트 렌더링
        function renderArchive(files) {
            const list = document.getElementById("archive-list");
            list.innerHTML = "";

            files.forEach((file, index) => {
                const date = fileNameToDate(file.name);
                const item = document.createElement("div");
                item.className = "archive-item" + (index === 0 ? " active" : "");
                item.id = `archive-${file.name}`;
                item.onclick = () => {
                    loadReport(file.name, file.download_url);
                    closeSidebar();
                };
                item.innerHTML = `
                    <div class="archive-headline">AI 트렌드 리포트</div>
                    <div class="archive-date">${date}</div>
                `;
                list.appendChild(item);
            });
        }

        // 리포트 로드
        function loadReport(filename, url) {
            // 활성 아이템 변경
            document.querySelectorAll(".archive-item").forEach(el => {
                el.classList.remove("active");
            });
            const activeItem = document.getElementById(`archive-${filename}`);
            if (activeItem) activeItem.classList.add("active");

            // iframe에 리포트 로드
            const viewer = document.getElementById("report-viewer");
            const welcome = document.getElementById("welcome-screen");
            viewer.src = `${REPORTS_PATH}/${filename}`;
            viewer.style.display = "block";
            welcome.style.display = "none";
        }

        // 파일명 → 날짜 변환
        function fileNameToDate(filename) {
            const name = filename.replace(".html", "");
            const parts = name.split("-");
            if (parts.length === 3) {
                return `${parts[0]}년 ${parts[1]}월 ${parts[2]}일`;
            }
            return name;
        }

        // 모바일 사이드바 토글
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("open");
        }

        function closeSidebar() {
            document.getElementById("sidebar").classList.remove("open");
            document.getElementById("overlay").classList.remove("open");
        }

        // 초기 로드
        loadArchive();
    </script>
</body>
</html>
