<style>
  #report-viewer {
    width: 100%; height: 100vh;
    border: none; display: none;
  }
  .scrim {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(5,9,18,.5); opacity: 0; pointer-events: none;
    transition: opacity 220ms cubic-bezier(0.22,1,0.36,1);
  }
  .app.nav-open .scrim  { opacity: 1; pointer-events: auto; }
  .app.nav-open .sidebar { transform: translateX(0) !important; }
  .welcome {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 12px; text-align: center;
  }
  .welcome-icon  { font-size: 2.4rem; }
  .welcome-title { font-size: 1rem; font-weight: 700; color: var(--fg); }
  .welcome-desc  { font-size: .85rem; color: var(--fg-subtle); }
  /* 아카이브 로딩 */
  .arc-loading {
    padding: 12px 16px; color: var(--fg-subtle);
    font-size: .82rem; font-family: var(--font-sans);
  }
</style>
</head>

  var MOON = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';

  /* ── 에디션 라벨 ── */
  function setEdition(dateStr) {
    var m = dateStr.match(/(\d{4})\D+(\d{2})/);
    if (!m) return;
    var txt = m[1] + "." + m[2] + " EDITION";
    document.querySelectorAll(".js-edition").forEach(function(el){ el.textContent = txt; });
  }

  /* ── 테마 ── */

    document.documentElement.setAttribute("data-theme", t);
    document.getElementById("themeIco").innerHTML = (t === "dark") ? SUN : MOON;
    document.getElementById("themeLbl").textContent = (t === "dark") ? "라이트" : "다크";
    document.getElementById("sideLogo").src = (t === "dark") ? LOGO_WHITE : LOGO_INK;
    localStorage.setItem("cheil-report-theme", t);
    syncIframeTheme(t);
  }
  function syncIframeTheme(t) {
    var fr = document.getElementById("report-viewer");
    try { if (fr.contentDocument) fr.contentDocument.documentElement.setAttribute("data-theme", t); } catch(e){}
  }
  var theme = localStorage.getItem("cheil-report-theme") || "light";
  applyTheme(theme);
  document.getElementById("themeBtn").addEventListener("click", function () {
    applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  /* ── 파일명 → 날짜 변환 ── */
  function fileToKorDate(name) {
    var p = name.replace(".html","").split("-");
    return p.length === 3 ? p[0]+"년 "+p[1]+"월 "+p[2]+"일" : name;
  }
  function fileToIso(name) {
    var p = name.replace(".html","").split("-");
    return p.length === 3 ? p[0]+"."+p[1]+"."+p[2] : name;
  }

  /* ── 리포트 헤드라인 가져오기 ── */
  // 각 HTML 파일을 fetch해서 <meta name="report-headline"> 또는 <title> 읽기
  async function fetchHeadline(filename) {
    try {
      var res = await fetch(REPORTS_PATH + "/" + filename);
      var text = await res.text();
      // <meta name="report-headline" content="..."> 우선
      var m = text.match(/<meta[^>]+name=["']report-headline["'][^>]+content=["']([^"']+)["']/i);
      if (m) return m[1];
      // fallback: <title>
      var t = text.match(/<title>([^<]+)<\/title>/i);
      if (t) return t[1];
    } catch(e) {}
    return "AI 트렌드 리포트";
  }

  /* ── 아카이브 로드 ── */
  async function loadArchive() {
    var nav = document.getElementById("archive");
    try {
      var res   = await fetch("https://api.github.com/repos/" + GITHUB_USERNAME + "/" + GITHUB_REPO + "/contents/" + REPORTS_PATH);
      var files = await res.json();
      if (!Array.isArray(files)) { nav.innerHTML = '<div class="arc-loading">리포트가 없습니다.</div>'; return; }

      var htmlFiles = files
        .filter(function(f){ return f.name.endsWith(".html"); })
        .sort(function(a,b){ return b.name.localeCompare(a.name); });

      if (!htmlFiles.length) { nav.innerHTML = '<div class="arc-loading">리포트가 없습니다.</div>'; return; }

      // 에디션 라벨을 최신 파일 날짜로 업데이트
      setEdition(fileToKorDate(htmlFiles[0].name));

      // 아카이브 아이템 렌더 (일단 날짜만, 헤드라인은 비동기 로드)
      nav.innerHTML = "";
      htmlFiles.forEach(function(f, i) {
        var btn = document.createElement("button");
        btn.className = "arc-item" + (i === 0 ? " active" : "");
        btn.setAttribute("data-name", f.name);
        btn.innerHTML =
          '<span class="arc-title">AI 트렌드 리포트</span>' +
          '<span class="arc-date">' + fileToIso(f.name) + '</span>';
        btn.addEventListener("click", function(){
          loadReport(f.name);
          app.classList.remove("nav-open");
        });
        nav.appendChild(btn);
      });

      // 헤드라인 비동기 로드 (순서대로, 너무 빠른 fetch 방지)
      for (var i = 0; i < htmlFiles.length; i++) {
        (function(idx, filename) {
          setTimeout(async function() {
            var headline = await fetchHeadline(filename);
            var btn = nav.querySelector('[data-name="' + filename + '"]');
            if (btn) {
              btn.querySelector(".arc-title").textContent = headline;
            }
          }, idx * 150); // 150ms 간격으로 순차 fetch
        })(i, htmlFiles[i].name);
      }

      // 첫 번째 리포트 자동 로드
      loadReport(htmlFiles[0].name);

    } catch(e) {
      nav.innerHTML = '<div class="arc-loading">아카이브를 불러오지 못했습니다.</div>';
    }
  }

  /* ── 리포트 로드 ── */
  function loadReport(filename) {
    document.querySelectorAll(".arc-item").forEach(function(el){
      el.classList.toggle("active", el.getAttribute("data-name") === filename);
    });
    var viewer  = document.getElementById("report-viewer");
    var welcome = document.getElementById("welcome-screen");
    viewer.src = REPORTS_PATH + "/" + filename;
    viewer.style.display = "block";
    welcome.style.display = "none";
    viewer.onload = function(){
      syncIframeTheme(document.documentElement.getAttribute("data-theme") || "light");
    };
  }

  loadArchive();
})();

</html>
