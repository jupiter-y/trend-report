<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 트렌드 리포트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--fg-subtle);
            font-size: 0.85em;
            font-family: var(--font-sans);
        }

        #report-viewer {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        /* 사이드바 오버레이 (모바일) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 998;
        }

        .empty-state {
            padding: 20px;
            color: var(--fg-subtle);
            font-size: 0.82em;
            line-height: 1.6;
        }

        /* ── Topbar ── */
        .topbar {
            position: fixed;
            top: 0; left: 280px; right: 0;
            height: 48px;
            background-color: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 24px;
            z-index: 100;
            gap: 8px;
        }

        .topbar-label {
            font-size: 0.75rem;
            color: var(--fg-subtle);
            font-weight: 500;
        }

        /* ── 다크/라이트 토글 ── */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--fg-muted);
            font-family: var(--font-sans);
            transition: background 160ms, border-color 160ms, color 160ms;
        }

        .theme-toggle:hover {
            background: var(--bg-subtle);
            border-color: var(--border-strong);
            color: var(--fg);
        }

        .theme-toggle .icon { font-size: 0.9rem; }

        /* ── 사이드바 헤드 ── */
        .sidebar-head {
            margin-bottom: 24px;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2px;
        }

        .sidebar-desc {
            font-size: 0.75rem;
            color: var(--fg-subtle);
            line-height: 1.4;
        }

        /* ── 모바일 토글 버튼 ── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 10px; left: 16px;
            z-index: 1000;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg-muted);
            padding: 7px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82em;
            font-family: var(--font-sans);
        }

        /* ── 웰컴 스크린 ── */
        .welcome-inner {
            margin-top: 100px;
            text-align: center;
        }

        .welcome-icon { font-size: 2.2rem; margin-bottom: 16px; }

        .welcome-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 8px;
        }

        .welcome-desc {
            font-size: 0.85rem;
            color: var(--fg-subtle);
            line-height: 1.8;
        }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .sidebar-toggle { display: block; }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 999;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main-wrapper { margin-left: 0 !important; }
            #report-viewer { height: 100vh; }
            .topbar { left: 0; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar { width: 220px; min-width: 220px; }
            .topbar { left: 220px; }
        }
    </style>
</head>
<body>

    <!-- 모바일 토글 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰ 아카이브</button>

    <!-- 오버레이 -->
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- 사이드바 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-head">
            <div class="sidebar-brand">AI Trend Report</div>
            <div class="sidebar-desc">매일 업데이트되는<br>AI 트렌드 분석</div>
        </div>
        <div class="sidebar-title">리포트 아카이브</div>
        <div id="archive-list">
            <div class="loading">불러오는 중…</div>
        </div>
    </div>

    <!-- Topbar -->
    <div class="topbar" id="topbar">
        <span class="topbar-label" id="topbar-date"></span>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
            <span class="icon">🌙</span>
            <span id="theme-label">다크</span>
        </button>
    </div>

    <!-- 메인 -->
    <div class="main-wrapper" id="main-wrapper" style="margin-left: 280px; flex: 1;">
        <iframe id="report-viewer" title="리포트 뷰어"></iframe>
        <div class="main" id="welcome-screen" style="padding-top: 80px;">
            <div class="welcome-inner">
                <div class="welcome-icon">📊</div>
                <div class="welcome-title">AI 트렌드 리포트</div>
                <div class="welcome-desc">왼쪽 아카이브에서 리포트를 선택해주세요.</div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = "jupiter-y";
        const GITHUB_REPO = "trend-report";
        const REPORTS_PATH = "reports";

        /* ── 테마 토글 ── */
        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            const btn = document.getElementById("theme-btn");
            const label = document.getElementById("theme-label");
            if (theme === "dark") {
                btn.querySelector(".icon").textContent = "☀️";
                label.textContent = "라이트";
            } else {
                btn.querySelector(".icon").textContent = "🌙";
                label.textContent = "다크";
            }
            localStorage.setItem("theme", theme);

            // iframe 내부도 테마 동기화
            const iframe = document.getElementById("report-viewer");
            if (iframe.contentDocument) {
                iframe.contentDocument.documentElement.setAttribute("data-theme", theme);
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme") || "light";
            applyTheme(current === "light" ? "dark" : "light");
        }

        // 저장된 테마 복원
        const savedTheme = localStorage.getItem("theme") || "light";
        applyTheme(savedTheme);

        /* ── 아카이브 로드 ── */
        async function loadArchive() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${REPORTS_PATH}`;
                const res = await fetch(url);
                const files = await res.json();

                if (!Array.isArray(files)) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                const htmlFiles = files
                    .filter(f => f.name.endsWith(".html"))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (htmlFiles.length === 0) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                renderArchive(htmlFiles);
                loadReport(htmlFiles[0].name, htmlFiles[0].download_url);

            } catch (e) {
                document.getElementById("archive-list").innerHTML =
                    '<div class="empty-state">아카이브를 불러오지 못했습니다.</div>';
            }
        }

        function renderArchive(files) {
            const list = document.getElementById("archive-list");
            list.innerHTML = "";
            files.forEach((file, index) => {
                const date = fileNameToDate(file.name);
                const item = document.createElement("div");
                item.className = "archive-item" + (index === 0 ? " active" : "");
                item.id = `archive-${file.name}`;
                item.onclick = () => { loadReport(file.name, file.download_url); closeSidebar(); };
                item.innerHTML = `
                    <div class="archive-headline">AI 트렌드 리포트</div>
                    <div class="archive-date">${date}</div>`;
                list.appendChild(item);
            });
        }

        function loadReport(filename, url) {
            document.querySelectorAll(".archive-item").forEach(el => el.classList.remove("active"));
            const activeItem = document.getElementById(`archive-${filename}`);
            if (activeItem) activeItem.classList.add("active");

            // 날짜 topbar 표시
            document.getElementById("topbar-date").textContent = fileNameToDate(filename);

            const viewer = document.getElementById("report-viewer");
            const welcome = document.getElementById("welcome-screen");
            viewer.src = `${REPORTS_PATH}/${filename}`;
            viewer.style.display = "block";
            welcome.style.display = "none";

            // iframe 로드 후 테마 동기화
            viewer.onload = () => {
                const theme = document.documentElement.getAttribute("data-theme") || "light";
                try {
                    viewer.contentDocument.documentElement.setAttribute("data-theme", theme);
                } catch(e) {}
            };
        }

        function fileNameToDate(filename) {
            const name = filename.replace(".html", "");
            const parts = name.split("-");
            if (parts.length === 3) return `${parts[0]}년 ${parts[1]}월 ${parts[2]}일`;
            return name;
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("open");
        }

        function closeSidebar() {
            document.getElementById("sidebar").classList.remove("open");
            document.getElementById("overlay").classList.remove("open");
        }

        loadArchive();
    </script>
</body>
</html>
