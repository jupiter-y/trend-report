<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 트렌드 리포트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #6b7280;
            font-size: 0.9em;
        }

        #report-viewer {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background-color: #1a1d27;
            border: 1px solid #2a2d3a;
            color: #c0c4d0;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }

        .empty-state {
            padding: 20px;
            color: #6b7280;
            font-size: 0.85em;
            line-height: 1.6;
        }

        /* 날짜 배지 스타일 강화 */
        .archive-date {
            font-size: 0.75em;
            color: #6b7280;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .archive-date::before {
            content: "📅";
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .sidebar-toggle { display: block; }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 999;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main-wrapper { margin-left: 0 !important; }
            #report-viewer { height: 100vh; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar { width: 220px; min-width: 220px; }
        }
    </style>
</head>
<body>

    <button class="sidebar-toggle" onclick="toggleSidebar()">☰ 아카이브</button>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">리포트 아카이브</div>
        <div id="archive-list">
            <div class="loading">불러오는 중...</div>
        </div>
    </div>

    <div class="main-wrapper" id="main-wrapper" style="margin-left: 280px; flex: 1;">
        <iframe id="report-viewer" title="리포트 뷰어"></iframe>
        <div class="main" id="welcome-screen">
            <div style="margin-top: 100px; text-align: center; color: #6b7280;">
                <div style="font-size: 2em; margin-bottom: 20px;">📊</div>
                <div style="font-size: 1.1em; font-weight: 600; color: #c0c4d0; margin-bottom: 12px;">
                    AI 트렌드 리포트
                </div>
                <div style="font-size: 0.9em; line-height: 1.8;">
                    왼쪽 아카이브에서 리포트를 선택해주세요.
                </div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = "jupiter-y";
        const GITHUB_REPO = "trend-report";
        const REPORTS_PATH = "reports";

        async function loadArchive() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${REPORTS_PATH}`;
                const res = await fetch(url);
                const files = await res.json();

                if (!Array.isArray(files)) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                const htmlFiles = files
                    .filter(f => f.name.endsWith(".html"))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (htmlFiles.length === 0) {
                    document.getElementById("archive-list").innerHTML =
                        '<div class="empty-state">리포트가 없습니다.</div>';
                    return;
                }

                await renderArchive(htmlFiles);
                loadReport(htmlFiles[0].name, htmlFiles[0].download_url);

            } catch (e) {
                document.getElementById("archive-list").innerHTML =
                    '<div class="empty-state">아카이브를 불러오지 못했습니다.</div>';
            }
        }

        async function renderArchive(files) {
            const list = document.getElementById("archive-list");
            list.innerHTML = "";

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const date = fileNameToDate(file.name);

                let headline = "AI 트렌드 리포트";
                try {
                    const res = await fetch(file.download_url);
                    const html = await res.text();
                    const titleMatch = html.match(/<title>(.*?)<\/title>/i);
                    if (titleMatch) headline = titleMatch[1].trim();
                } catch (e) {}

                const item = document.createElement("div");
                item.className = "archive-item" + (i === 0 ? " active" : "");
                item.id = `archive-${file.name}`;
                item.onclick = () => {
                    loadReport(file.name, file.download_url);
                    closeSidebar();
                };
                item.innerHTML = `
                    <div class="archive-headline">${headline}</div>
                    <div class="archive-date">${date}</div>
                `;
                list.appendChild(item);
            }
        }

        function loadReport(filename, url) {
            document.querySelectorAll(".archive-item").forEach(el => {
                el.classList.remove("active");
            });
            const activeItem = document.getElementById(`archive-${filename}`);
            if (activeItem) activeItem.classList.add("active");

            const viewer = document.getElementById("report-viewer");
            const welcome = document.getElementById("welcome-screen");
            viewer.src = `${REPORTS_PATH}/${filename}`;
            viewer.style.display = "block";
            welcome.style.display = "none";
        }

        function fileNameToDate(filename) {
            const name = filename.replace(".html", "");
            const parts = name.split("-");
            if (parts.length === 3) {
                return `${parts[0]}년 ${parts[1]}월 ${parts[2]}일`;
            }
            return name;
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("open");
        }

        function closeSidebar() {
            document.getElementById("sidebar").classList.remove("open");
            document.getElementById("overlay").classList.remove("open");
        }

        loadArchive();
    </script>
</body>
</html>
