  function setEdition(dateStr) {
    var m = dateStr.match(/(\d{4})\D+(\d{2})/);
    if (!m) return;
    var txt = m[1] + "." + m[2] + " EDITION";
    document.querySelectorAll(".js-edition").forEach(function(el){ el.textContent = txt; });
  }

  /* ── 테마 ── */

    document.documentElement.setAttribute("data-theme", t);
    document.getElementById("themeIco").innerHTML = (t === "dark") ? SUN : MOON;
    document.getElementById("themeLbl").textContent = (t === "dark") ? "라이트" : "다크";
    document.getElementById("sideLogo").src = (t === "dark") ? LOGO_WHITE : LOGO_INK;
    localStorage.setItem("cheil-report-theme", t);
    // iframe 동기화
    var fr = document.getElementById("report-viewer");
    try { fr.contentDocument && fr.contentDocument.documentElement.setAttribute("data-theme", t); } catch(e){}
  }
  var theme = localStorage.getItem("cheil-report-theme") || "light";
  applyTheme(theme);
  document.getElementById("themeBtn").addEventListener("click", function () {
    applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  document.getElementById("menuBtn").addEventListener("click", function(){ app.classList.add("nav-open"); });
  document.getElementById("sideClose").addEventListener("click", function(){ app.classList.remove("nav-open"); });
  document.getElementById("scrim").addEventListener("click", function(){ app.classList.remove("nav-open"); });

  /* ── 아카이브 로드 ── */
  async function loadArchive() {
    try {
      var res = await fetch("https://api.github.com/repos/" + GITHUB_USERNAME + "/" + GITHUB_REPO + "/contents/" + REPORTS_PATH);
      var files = await res.json();
      if (!Array.isArray(files)) { showEmpty(); return; }
      var htmlFiles = files.filter(function(f){ return f.name.endsWith(".html"); })
                          .sort(function(a,b){ return b.name.localeCompare(a.name); });
      if (!htmlFiles.length) { showEmpty(); return; }
      renderArchive(htmlFiles);
      setEdition(fileNameToDate(htmlFiles[0].name));
      loadReport(htmlFiles[0].name);
    } catch(e) { showEmpty(); }
  }

  function showEmpty() {
    document.getElementById("archive").innerHTML =
      '<div style="padding:12px 8px;color:var(--fg-subtle);font-size:.82rem;">리포트가 없습니다.</div>';
  }

  function renderArchive(files) {
    var nav = document.getElementById("archive");
    nav.innerHTML = "";
    files.forEach(function(f, i) {
      var btn = document.createElement("button");
      btn.className = "arc-item" + (i === 0 ? " active" : "");
      btn.setAttribute("data-name", f.name);
      var dateStr = fileNameToDate(f.name);
      var isoStr  = isoDate(f.name);
      btn.innerHTML =
        '<span class="arc-title">AI 트렌드 리포트</span>' +
        '<span class="arc-date">' + isoStr + '</span>';
      btn.addEventListener("click", function(){
        loadReport(f.name);
        app.classList.remove("nav-open");
      });
      nav.appendChild(btn);
    });
  }

  function loadReport(filename) {
    document.querySelectorAll(".arc-item").forEach(function(el){
      el.classList.toggle("active", el.getAttribute("data-name") === filename);
    });
    var viewer  = document.getElementById("report-viewer");
    var welcome = document.getElementById("welcome-screen");
    viewer.src = REPORTS_PATH + "/" + filename;
    viewer.style.display = "block";
    welcome.style.display = "none";
    viewer.onload = function(){
      try { viewer.contentDocument.documentElement.setAttribute("data-theme",
        document.documentElement.getAttribute("data-theme")); } catch(e){}
    };
  }

  function fileNameToDate(filename) {
    var n = filename.replace(".html","").split("-");
    return n.length === 3 ? n[0]+"년 "+n[1]+"월 "+n[2]+"일" : filename;
  }

  function isoDate(filename) {
    var n = filename.replace(".html","").split("-");
    return n.length === 3 ? n[0]+"."+n[1]+"."+n[2] : filename;
  }
